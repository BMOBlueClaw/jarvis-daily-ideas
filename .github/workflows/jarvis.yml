name: JARVIS Daily Ideas

on:
  schedule:
    # Runs every day at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch: # Allow manual trigger

# OWASP: Least privilege permissions
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  jarvis:
    runs-on: ubuntu-latest
    steps:
      # OWASP A08: Pin actions to full SHA to prevent supply-chain attacks
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run JARVIS
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node jarvis.mjs

      - name: Commit ideas database
        run: |
          git config user.name "JARVIS Bot"
          git config user.email "jarvis@bot.local"
          git add data/ideas.json
          git diff --cached --quiet || git commit -m "📊 JARVIS ideas $(date -u +%Y-%m-%d)"
          git push
