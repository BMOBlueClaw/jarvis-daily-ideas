<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- OWASP: Content Security Policy — block inline scripts, external resources -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'self' data:; connect-src 'self'; font-src 'self'; base-uri 'self'; form-action 'none'; frame-ancestors 'none';">
  <!-- OWASP: Prevent MIME sniffing -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <!-- OWASP: Referrer policy — don't leak paths -->
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <title>JARVIS Ideas Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
</head>
<body>
  <header>
    <div class="logo">🤖 JARVIS</div>
    <h1>Ideas Dashboard</h1>
    <p class="subtitle">AI × Crypto Business Ideas — Auto-generated daily</p>
  </header>

  <div class="controls">
    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="AI SaaS">AI SaaS</button>
      <button class="filter-btn" data-filter="Crypto × AI">Crypto × AI</button>
      <button class="filter-btn" data-filter="Content Business">Content</button>
      <button class="filter-btn" data-filter="Crypto Tool">Crypto Tool</button>
      <button class="filter-btn" data-filter="starred">⭐ Starred</button>
    </div>
    <div class="stats" id="stats"></div>
  </div>

  <div id="loading" class="loading">Loading ideas...</div>
  <div id="error" class="error" hidden></div>

  <main id="timeline"></main>

  <footer>
    <p>JARVIS — Your AI Business Partner 🧠 | Updated <span id="last-updated">—</span></p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
